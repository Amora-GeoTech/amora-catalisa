site_name: AMORA Geotech Solutions — Catalisa ICT
site_description: Documentação do projeto Catalisa ICT (Ciclo 2) — IA para simulação e análise de rocha digital.
site_url: https://Amora-GeoTech.github.io/amora-catalisa/
repo_url: https://github.com/Amora-GeoTech/amora-catalisa
repo_name: amora-catalisa

theme:
  name: material
  language: pt-BR
  features:
    - navigation.instant
    - content.code.copy
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    - scheme: default

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

nav:
  - Início: index.md
  - Projeto:
      - Visão Geral: projeto.md
      - Metodologia: metodologia.md
      - Roadmap: roadmap.md
  - Relatórios:
      - Como enviar: relatorios/index.md
      - Outubro/2025: relatorios/2025-10.md
  - Equipe: equipe.md
