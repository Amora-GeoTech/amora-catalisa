name: Relatório Mensal
description: Preencha o relatório mensal do Catalisa ICT
title: "Relatório Mensal: AAAA-MM"
labels: ["relatorio"]
body:
  - type: markdown
    attributes:
      value: |
        Preencha com objetividade. Anexe evidências quando possível.
  - type: input
    id: mes
    attributes:
      label: Mês de referência (AAAA-MM)
      placeholder: "2025-10"
    validations:
      required: true
  - type: textarea
    id: acoes
    attributes:
      label: 1) Ações previstas vs. executadas
      description: Liste o que estava no plano, o que foi feito e justificativas.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: evidencias
    attributes:
      label: 2) Evidências (links/prints)
      render: markdown
  - type: textarea
    id: marcos
    attributes:
      label: 3) Marcos, indicadores e métricas
      render: markdown
  - type: textarea
    id: riscos
    attributes:
      label: 4) Riscos & Mitigações
      render: markdown
  - type: textarea
    id: proximo
    attributes:
      label: 5) Plano do próximo mês
      render: markdown
  - type: textarea
    id: horas
    attributes:
      label: 6) Horas e bolsas (resumo)
      render: markdown
