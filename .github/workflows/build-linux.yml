name: Build Linux Package (Ubuntu 24.04)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: ${{ github.workspace }}/build
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          free -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /
          free -h

      - name: Setup swap space
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Memory after swap ==="
          free -h

      - name: Checkout AMORA source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            subversion \
            curl \
            wget \
            ninja-build \
            qtbase5-dev \
            qttools5-dev \
            qtmultimedia5-dev \
            qttools5-dev-tools \
            libqt5svg5-dev \
            libqt5xmlpatterns5-dev \
            libqt5opengl5-dev \
            libqt5x11extras5-dev \
            libqt5sql5-sqlite \
            qtbase5-private-dev \
            libxt-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            python3-dev \
            python3-pip \
            rapidjson-dev \
            libopenslide-dev \
            libarchive-dev \
            libtbb-dev

      - name: Configure superbuild
        run: |
          mkdir -p $BUILD_DIR
          cd $BUILD_DIR
          cmake \
            -DCMAKE_BUILD_TYPE:STRING=$BUILD_TYPE \
            -DSlicer_USE_SimpleITK:BOOL=ON \
            -DBUILD_TESTING:BOOL=OFF \
            -DSlicer_BUILD_DOCUMENTATION:BOOL=OFF \
            -DSlicer_BUILD_APPLICATIONUPDATE_SUPPORT:BOOL=OFF \
            -DSlicer_BUILD_EXTENSIONMANAGER_SUPPORT:BOOL=OFF \
            -DSlicer_BUILD_WEBENGINE_SUPPORT:BOOL=OFF \
            -DSlicer_BUILD_MULTIMEDIA_SUPPORT:BOOL=OFF \
            ${{ github.workspace }}

      - name: Build superbuild (external projects)
        run: |
          cd $BUILD_DIR
          # Use -j2 to avoid OOM on GitHub runners (7GB RAM)
          cmake --build . --config $BUILD_TYPE -- -j2

      - name: Build inner Slicer
        run: |
          cd $BUILD_DIR/Slicer-build
          # Use -j2 to avoid OOM during heavy C++ compilation
          cmake --build . --config $BUILD_TYPE -- -j2 2>&1 | tail -100

      - name: Create package (tar.gz)
        run: |
          cd $BUILD_DIR/Slicer-build
          cmake --build . --target package --config $BUILD_TYPE

      - name: Find package file
        id: find_package
        run: |
          PKG=$(find $BUILD_DIR/Slicer-build -maxdepth 1 -name "AmoraDigitalRock-*.tar.gz" | head -1)
          if [ -z "$PKG" ]; then
            echo "ERROR: Package not found!"
            ls -la $BUILD_DIR/Slicer-build/
            exit 1
          fi
          echo "package_path=$PKG" >> $GITHUB_OUTPUT
          echo "package_name=$(basename $PKG)" >> $GITHUB_OUTPUT
          echo "Found package: $PKG"
          ls -lh "$PKG"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_package.outputs.package_name }}
          path: ${{ steps.find_package.outputs.package_path }}
          retention-days: 30

      - name: Create GitHub Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_package.outputs.package_path }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
